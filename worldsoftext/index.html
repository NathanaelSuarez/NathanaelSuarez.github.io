<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Text World</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #eee;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: #1a1a2e;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 6px;
            z-index: 1000;
            flex-wrap: nowrap;
            overflow-x: auto;
        }

        #toolbar button, #toolbar select, #toolbar input[type="text"] {
            background: #16213e;
            color: #eee;
            border: 1px solid #444;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            font-family: inherit;
        }

        #toolbar button:hover { background: #0f3460; }
        #toolbar button.active { background: #e94560; border-color: #e94560; }

        #toolbar .separator {
            width: 1px;
            height: 24px;
            background: #444;
            flex-shrink: 0;
        }

        #toolbar label {
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
        }

        #toolbar input[type="color"] {
            width: 28px;
            height: 28px;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        #canvas-container {
            position: absolute;
            top: 44px;
            left: 0;
            right: 0;
            bottom: 30px;
            overflow: hidden;
            cursor: text;
        }

        #world {
            position: absolute;
            transform-origin: 0 0;
        }

        .cell {
            position: absolute;
            width: 14px;
            height: 20px;
            font-size: 16px;
            line-height: 20px;
            text-align: center;
            pointer-events: none;
            will-change: transform;
        }

        #cursor {
            position: absolute;
            width: 14px;
            height: 20px;
            border: 2px solid #e94560;
            pointer-events: none;
            z-index: 100;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49% { border-color: #e94560; }
            50%, 100% { border-color: transparent; }
        }

        .remote-cursor {
            position: absolute;
            width: 14px;
            height: 20px;
            border: 2px solid #00ff88;
            pointer-events: none;
            z-index: 99;
            opacity: 0.7;
        }

        .remote-cursor-label {
            position: absolute;
            top: -18px;
            left: 0;
            font-size: 10px;
            color: #00ff88;
            white-space: nowrap;
            pointer-events: none;
        }

        #selection-rect {
            position: absolute;
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid rgba(233, 69, 96, 0.5);
            pointer-events: none;
            z-index: 50;
            display: none;
        }

        #statusbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: #1a1a2e;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 20px;
            font-size: 12px;
            color: #888;
            z-index: 1000;
        }

        #statusbar span { white-space: nowrap; }
        #statusbar .coord { color: #e94560; }
        #statusbar .peers { color: #00ff88; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: #1a1a2e;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 24px;
            min-width: 400px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 { margin-bottom: 16px; color: #e94560; }
        .modal input[type="text"] {
            width: 100%;
            padding: 8px;
            background: #16213e;
            border: 1px solid #444;
            color: #eee;
            border-radius: 4px;
            margin-bottom: 10px;
            font-family: inherit;
        }

        .modal button {
            padding: 6px 16px;
            margin: 4px;
            background: #16213e;
            color: #eee;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
        }
        .modal button:hover { background: #0f3460; }
        .modal button.primary { background: #e94560; border-color: #e94560; }

        .world-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border: 1px solid #333;
            border-radius: 4px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .world-list-item:hover { background: #16213e; }
        .world-list-item .info { flex: 1; }
        .world-list-item .info .name { font-weight: bold; }
        .world-list-item .info .meta { font-size: 11px; color: #888; margin-top: 2px; }
        .world-list-item .actions { display: flex; gap: 4px; }
        .world-list-item .actions button { font-size: 11px; padding: 2px 8px; }

        #paste-preview {
            display: none;
            position: absolute;
            pointer-events: none;
            z-index: 80;
            opacity: 0.5;
        }

        .grid-lines {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            z-index: -1;
        }

        #minimap {
            position: fixed;
            bottom: 40px;
            right: 10px;
            width: 150px;
            height: 100px;
            background: #111;
            border: 1px solid #444;
            border-radius: 4px;
            z-index: 999;
            overflow: hidden;
        }

        #minimap canvas { width: 100%; height: 100%; }

        #hidden-input {
            position: fixed;
            left: -9999px;
            top: -9999px;
            opacity: 0;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            border: 1px solid #e94560;
            color: #eee;
            padding: 8px 20px;
            border-radius: 4px;
            z-index: 3000;
            animation: fadeInOut 2s ease forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        .tool-group {
            display: flex;
            gap: 3px;
        }
    </style>
</head>
<body>

<div id="toolbar">
    <button onclick="showWorldsModal()" title="Worlds">📁</button>
    <button onclick="saveCurrentWorld()" title="Save">💾</button>
    <div class="separator"></div>

    <div class="tool-group">
        <button id="tool-type" class="active" onclick="setTool('type')" title="Type">✏️</button>
        <button id="tool-select" onclick="setTool('select')" title="Select">⬜</button>
        <button id="tool-erase" onclick="setTool('erase')" title="Erase">🧹</button>
        <button id="tool-pan" onclick="setTool('pan')" title="Pan">✋</button>
        <button id="tool-fill" onclick="setTool('fill')" title="Fill Char">🪣</button>
    </div>

    <div class="separator"></div>

    <label>FG</label>
    <input type="color" id="fg-color" value="#ffffff" title="Text Color">
    <label>BG</label>
    <input type="color" id="bg-color" value="#0a0a0a" title="Background Color">
    <button onclick="toggleBgEnabled()" id="bg-toggle" title="Toggle BG">BG:Off</button>

    <div class="separator"></div>

    <select id="font-size" onchange="setFontSize()" title="Size">
        <option value="12">12px</option>
        <option value="14">14px</option>
        <option value="16" selected>16px</option>
        <option value="20">20px</option>
        <option value="24">24px</option>
    </select>

    <button onclick="toggleBold()" id="btn-bold" title="Bold"><b>B</b></button>

    <div class="separator"></div>

    <button onclick="doUndo()" title="Undo (Ctrl+Z)">↩️</button>
    <button onclick="doRedo()" title="Redo (Ctrl+Y)">↪️</button>

    <div class="separator"></div>

    <button onclick="showShareModal()" title="Share / Multiplayer">🔗</button>
    <button onclick="exportWorld()" title="Export">📤</button>
    <button onclick="showImportModal()" title="Import">📥</button>

    <div class="separator"></div>

    <button onclick="toggleGrid()" id="btn-grid" title="Grid">Grid</button>
    <button onclick="toggleMinimap()" id="btn-minimap" title="Minimap">Map</button>
    <button onclick="goHome()" title="Go to 0,0">🏠</button>
</div>

<div id="canvas-container">
    <div id="world">
        <canvas class="grid-lines" id="grid-canvas"></canvas>
        <div id="selection-rect"></div>
        <div id="cursor"></div>
        <div id="paste-preview"></div>
    </div>
</div>

<div id="minimap"><canvas id="minimap-canvas"></canvas></div>

<div id="statusbar">
    <span>Pos: <span class="coord" id="status-pos">0, 0</span></span>
    <span>Zoom: <span id="status-zoom">100%</span></span>
    <span>Cells: <span id="status-cells">0</span></span>
    <span class="peers">Peers: <span id="status-peers">0</span></span>
    <span>World: <span id="status-world">Untitled</span></span>
    <span id="status-autosave"></span>
</div>

<textarea id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

<!-- Worlds Modal -->
<div class="modal-overlay" id="worlds-modal">
    <div class="modal">
        <h2>📁 Worlds</h2>
        <div style="display:flex;gap:6px;margin-bottom:16px;">
            <input type="text" id="new-world-name" placeholder="New world name...">
            <button class="primary" onclick="createNewWorld()">Create</button>
        </div>
        <div id="worlds-list"></div>
        <div style="text-align:right;margin-top:12px;">
            <button onclick="closeModal('worlds-modal')">Close</button>
        </div>
    </div>
</div>

<!-- Share Modal -->
<div class="modal-overlay" id="share-modal">
    <div class="modal">
        <h2>🔗 Share & Multiplayer</h2>
        <div id="share-host-section">
            <p style="margin-bottom:10px;">Host this world and share the link:</p>
            <button class="primary" onclick="startHosting()">Start Hosting</button>
            <div id="share-link-area" style="display:none;margin-top:10px;">
                <input type="text" id="share-link" readonly>
                <button onclick="copyShareLink()">Copy</button>
            </div>
        </div>
        <div id="share-peers" style="margin-top:16px;">
            <h3 style="font-size:14px;color:#888;">Connected Peers</h3>
            <div id="peers-list" style="margin-top:6px;"></div>
        </div>
        <div style="text-align:right;margin-top:12px;">
            <button onclick="closeModal('share-modal')">Close</button>
        </div>
    </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="import-modal">
    <div class="modal">
        <h2>📥 Import</h2>
        <p style="margin-bottom:10px;">Paste JSON export or plain text:</p>
        <textarea id="import-data" style="width:100%;height:200px;background:#16213e;color:#eee;border:1px solid #444;border-radius:4px;padding:8px;font-family:monospace;"></textarea>
        <div style="margin-top:10px; display:flex; gap:6px;">
            <button class="primary" onclick="importJSON()">Import as World Data</button>
            <button onclick="importPlainText()">Import as Plain Text</button>
        </div>
        <div style="text-align:right;margin-top:12px;">
            <button onclick="closeModal('import-modal')">Close</button>
        </div>
    </div>
</div>

<script>
// ============================================
// CONSTANTS
// ============================================
const CELL_W = 14;
const CELL_H = 20;
const CHUNK_SIZE = 32;
const AUTOSAVE_INTERVAL = 15000;
const DB_NAME = 'InfiniteTextWorldDB';
const DB_VERSION = 3;

// ============================================
// STATE
// ============================================
let state = {
    worldId: null,
    worldName: 'Untitled',
    cells: new Map(),       // "x,y" -> { ch, fg, bg, bold, size }
    cursorX: 0,
    cursorY: 0,
    viewX: 0,
    viewY: 0,
    zoom: 1,
    tool: 'type',
    fgColor: '#ffffff',
    bgColor: '#0a0a0a',
    bgEnabled: false,
    fontSize: 16,
    bold: false,
    showGrid: false,
    showMinimap: true,
    selection: null,        // {x1,y1,x2,y2}
    clipboard: null,        // [{dx,dy,cell}]
    undoStack: [],
    redoStack: [],
    dirty: false,
    selectDragging: false,
    panning: false,
    panStartX: 0,
    panStartY: 0,
    panViewStartX: 0,
    panViewStartY: 0,
};

// DOM cache
let domCells = new Map();
let worldEl, cursorEl, containerEl, selectionRectEl, gridCanvas, minimapCanvas;

// P2P
let peer = null;
let connections = [];
let isHost = false;
let hostPeerId = null;

// ============================================
// INDEXEDDB
// ============================================
let db = null;

function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains('worlds')) {
                d.createObjectStore('worlds', { keyPath: 'id' });
            }
            if (!d.objectStoreNames.contains('chunks')) {
                const cs = d.createObjectStore('chunks', { keyPath: 'key' });
                cs.createIndex('worldId', 'worldId', { unique: false });
            }
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(db); };
        req.onerror = (e) => reject(e);
    });
}

function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
}

function chunkKey(worldId, cx, cy) {
    return `${worldId}:${cx}:${cy}`;
}

function cellToChunk(x, y) {
    return {
        cx: Math.floor(x / CHUNK_SIZE),
        cy: Math.floor(y / CHUNK_SIZE)
    };
}

async function saveWorldMeta(id, name, extra = {}) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction('worlds', 'readwrite');
        const store = tx.objectStore('worlds');
        const req = store.get(id);
        req.onsuccess = () => {
            const existing = req.result || {};
            const world = {
                ...existing,
                id,
                name,
                updatedAt: Date.now(),
                createdAt: existing.createdAt || Date.now(),
                ...extra
            };
            store.put(world);
            tx.oncomplete = () => resolve(world);
        };
        req.onerror = reject;
    });
}

async function saveChunks(worldId) {
    // Group cells into chunks
    const chunks = new Map();
    for (const [key, cell] of state.cells) {
        const [x, y] = key.split(',').map(Number);
        const { cx, cy } = cellToChunk(x, y);
        const ck = chunkKey(worldId, cx, cy);
        if (!chunks.has(ck)) {
            chunks.set(ck, { key: ck, worldId, cx, cy, cells: {} });
        }
        chunks.get(ck).cells[key] = cell;
    }

    return new Promise((resolve, reject) => {
        const tx = db.transaction('chunks', 'readwrite');
        const store = tx.objectStore('chunks');
        // Clear old chunks for this world
        const idx = store.index('worldId');
        const range = IDBKeyRange.only(worldId);
        const cursorReq = idx.openCursor(range);
        const keysToDelete = [];
        cursorReq.onsuccess = (e) => {
            const c = e.target.result;
            if (c) {
                keysToDelete.push(c.primaryKey);
                c.continue();
            } else {
                // Delete old then insert new
                for (const k of keysToDelete) {
                    store.delete(k);
                }
                for (const [, chunk] of chunks) {
                    store.put(chunk);
                }
                tx.oncomplete = () => resolve();
            }
        };
        tx.onerror = reject;
    });
}

async function loadWorldChunks(worldId) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction('chunks', 'readonly');
        const store = tx.objectStore('chunks');
        const idx = store.index('worldId');
        const range = IDBKeyRange.only(worldId);
        const req = idx.getAll(range);
        req.onsuccess = () => {
            const cells = new Map();
            for (const chunk of req.result) {
                for (const [key, cell] of Object.entries(chunk.cells)) {
                    cells.set(key, cell);
                }
            }
            resolve(cells);
        };
        req.onerror = reject;
    });
}

async function getAllWorlds() {
    return new Promise((resolve, reject) => {
        const tx = db.transaction('worlds', 'readonly');
        const req = tx.objectStore('worlds').getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = reject;
    });
}

async function deleteWorld(id) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(['worlds', 'chunks'], 'readwrite');
        tx.objectStore('worlds').delete(id);
        const store = tx.objectStore('chunks');
        const idx = store.index('worldId');
        const range = IDBKeyRange.only(id);
        const cursorReq = idx.openCursor(range);
        cursorReq.onsuccess = (e) => {
            const c = e.target.result;
            if (c) { store.delete(c.primaryKey); c.continue(); }
        };
        tx.oncomplete = () => resolve();
        tx.onerror = reject;
    });
}

async function saveCurrentWorld() {
    if (!state.worldId) {
        state.worldId = generateId();
    }
    await saveWorldMeta(state.worldId, state.worldName);
    await saveChunks(state.worldId);
    state.dirty = false;
    showToast('World saved!');
    document.getElementById('status-autosave').textContent = 'Saved ' + new Date().toLocaleTimeString();
}

async function loadWorld(id) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction('worlds', 'readonly');
        const req = tx.objectStore('worlds').get(id);
        req.onsuccess = async () => {
            const world = req.result;
            if (!world) return reject('World not found');
            const cells = await loadWorldChunks(id);
            resolve({ world, cells });
        };
        req.onerror = reject;
    });
}

// ============================================
// RENDERING
// ============================================
function renderVisibleCells() {
    const container = containerEl.getBoundingClientRect();
    const viewL = -state.viewX / state.zoom;
    const viewT = -state.viewY / state.zoom;
    const viewR = viewL + container.width / state.zoom;
    const viewB = viewT + container.height / state.zoom;

    const minCX = Math.floor(viewL / CELL_W) - 1;
    const maxCX = Math.ceil(viewR / CELL_W) + 1;
    const minCY = Math.floor(viewT / CELL_H) - 1;
    const maxCY = Math.ceil(viewB / CELL_H) + 1;

    // Track which keys are visible
    const visibleKeys = new Set();

    for (const [key, cell] of state.cells) {
        const [x, y] = key.split(',').map(Number);
        if (x >= minCX && x <= maxCX && y >= minCY && y <= maxCY) {
            visibleKeys.add(key);
            if (!domCells.has(key)) {
                createCellDOM(key, x, y, cell);
            } else {
                updateCellDOM(key, cell);
            }
        }
    }

    // Remove cells that are no longer visible or no longer exist
    for (const [key, el] of domCells) {
        if (!visibleKeys.has(key)) {
            el.remove();
            domCells.delete(key);
        }
    }
}

function createCellDOM(key, x, y, cell) {
    const el = document.createElement('div');
    el.className = 'cell';
    el.style.left = (x * CELL_W) + 'px';
    el.style.top = (y * CELL_H) + 'px';
    el.style.width = CELL_W + 'px';
    el.style.height = CELL_H + 'px';
    applyCellStyle(el, cell);
    el.textContent = cell.ch;
    worldEl.appendChild(el);
    domCells.set(key, el);
}

function updateCellDOM(key, cell) {
    const el = domCells.get(key);
    if (!el) return;
    el.textContent = cell.ch;
    applyCellStyle(el, cell);
}

function applyCellStyle(el, cell) {
    el.style.color = cell.fg || '#ffffff';
    if (cell.bg && cell.bg !== '#0a0a0a') {
        el.style.backgroundColor = cell.bg;
    } else {
        el.style.backgroundColor = '';
    }
    el.style.fontWeight = cell.bold ? 'bold' : 'normal';
    el.style.fontSize = (cell.size || 16) + 'px';
    el.style.lineHeight = CELL_H + 'px';
}

function updateView() {
    worldEl.style.transform = `translate(${state.viewX}px, ${state.viewY}px) scale(${state.zoom})`;
    renderVisibleCells();
    updateCursorPosition();
    updateGrid();
    updateMinimap();
    updateStatus();
}

function updateCursorPosition() {
    cursorEl.style.left = (state.cursorX * CELL_W) + 'px';
    cursorEl.style.top = (state.cursorY * CELL_H) + 'px';
}

function updateStatus() {
    document.getElementById('status-pos').textContent = `${state.cursorX}, ${state.cursorY}`;
    document.getElementById('status-zoom').textContent = Math.round(state.zoom * 100) + '%';
    document.getElementById('status-cells').textContent = state.cells.size;
    document.getElementById('status-peers').textContent = connections.length;
    document.getElementById('status-world').textContent = state.worldName;
}

function updateSelectionRect() {
    const sel = state.selection;
    const el = selectionRectEl;
    if (!sel) { el.style.display = 'none'; return; }
    const x1 = Math.min(sel.x1, sel.x2);
    const y1 = Math.min(sel.y1, sel.y2);
    const x2 = Math.max(sel.x1, sel.x2);
    const y2 = Math.max(sel.y1, sel.y2);
    el.style.display = 'block';
    el.style.left = (x1 * CELL_W) + 'px';
    el.style.top = (y1 * CELL_H) + 'px';
    el.style.width = ((x2 - x1 + 1) * CELL_W) + 'px';
    el.style.height = ((y2 - y1 + 1) * CELL_H) + 'px';
}

// ============================================
// GRID
// ============================================
function updateGrid() {
    if (!state.showGrid) {
        gridCanvas.style.display = 'none';
        return;
    }
    gridCanvas.style.display = 'block';
    const container = containerEl.getBoundingClientRect();
    const w = container.width / state.zoom + CELL_W * 4;
    const h = container.height / state.zoom + CELL_H * 4;

    gridCanvas.width = w;
    gridCanvas.height = h;

    const offsetX = (state.viewX / state.zoom) % CELL_W;
    const offsetY = (state.viewY / state.zoom) % CELL_H;

    gridCanvas.style.left = (-state.viewX / state.zoom - CELL_W * 2) + 'px';
    gridCanvas.style.top = (-state.viewY / state.zoom - CELL_H * 2) + 'px';

    const ctx = gridCanvas.getContext('2d');
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;

    const startX = offsetX + CELL_W * 2;
    const startY = offsetY + CELL_H * 2;

    ctx.beginPath();
    for (let x = startX % CELL_W; x < w; x += CELL_W) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
    }
    for (let y = startY % CELL_H; y < h; y += CELL_H) {
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
    }
    ctx.stroke();
}

// ============================================
// MINIMAP
// ============================================
function updateMinimap() {
    const minimapEl = document.getElementById('minimap');
    if (!state.showMinimap) { minimapEl.style.display = 'none'; return; }
    minimapEl.style.display = 'block';

    const canvas = minimapCanvas;
    const ctx = canvas.getContext('2d');
    canvas.width = 150;
    canvas.height = 100;
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, 150, 100);

    if (state.cells.size === 0) return;

    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const key of state.cells.keys()) {
        const [x, y] = key.split(',').map(Number);
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
    }

    const rangeX = maxX - minX + 1 || 1;
    const rangeY = maxY - minY + 1 || 1;
    const scaleX = 140 / rangeX;
    const scaleY = 90 / rangeY;
    const scale = Math.min(scaleX, scaleY, 4);

    const offX = (150 - rangeX * scale) / 2;
    const offY = (100 - rangeY * scale) / 2;

    for (const [key, cell] of state.cells) {
        const [x, y] = key.split(',').map(Number);
        ctx.fillStyle = cell.fg || '#fff';
        ctx.globalAlpha = 0.7;
        ctx.fillRect(offX + (x - minX) * scale, offY + (y - minY) * scale, Math.max(scale, 1), Math.max(scale, 1));
    }

    // Viewport indicator
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 1;
    const container = containerEl.getBoundingClientRect();
    const vl = -state.viewX / state.zoom / CELL_W;
    const vt = -state.viewY / state.zoom / CELL_H;
    const vw = container.width / state.zoom / CELL_W;
    const vh = container.height / state.zoom / CELL_H;
    ctx.strokeRect(
        offX + (vl - minX) * scale,
        offY + (vt - minY) * scale,
        vw * scale,
        vh * scale
    );

    // Cursor
    ctx.fillStyle = '#e94560';
    ctx.fillRect(
        offX + (state.cursorX - minX) * scale - 1,
        offY + (state.cursorY - minY) * scale - 1,
        3, 3
    );
}

// ============================================
// CELL OPERATIONS
// ============================================
function setCell(x, y, ch, fg, bg, bold, size, broadcast = true) {
    const key = `${x},${y}`;
    const oldCell = state.cells.get(key) || null;

    if (!ch || ch === '') {
        state.cells.delete(key);
        if (domCells.has(key)) {
            domCells.get(key).remove();
            domCells.delete(key);
        }
    } else {
        const cell = { ch, fg: fg || state.fgColor, bg: bg || (state.bgEnabled ? state.bgColor : '#0a0a0a'), bold: bold || false, size: size || state.fontSize };
        state.cells.set(key, cell);
    }

    state.dirty = true;

    if (broadcast) {
        const cell = state.cells.get(key) || null;
        broadcastToAll({
            type: 'cell',
            x, y, cell,
        });
    }

    renderVisibleCells();
    return oldCell;
}

function deleteCell(x, y, broadcast = true) {
    return setCell(x, y, '', null, null, false, 16, broadcast);
}

// ============================================
// UNDO / REDO
// ============================================
function pushUndo(actions) {
    state.undoStack.push(actions);
    if (state.undoStack.length > 500) state.undoStack.shift();
    state.redoStack = [];
}

function doUndo() {
    if (state.undoStack.length === 0) return;
    const actions = state.undoStack.pop();
    const redoActions = [];
    for (const action of actions) {
        const currentCell = state.cells.get(`${action.x},${action.y}`) || null;
        redoActions.push({ x: action.x, y: action.y, cell: currentCell ? { ...currentCell } : null });
        if (action.cell) {
            setCell(action.x, action.y, action.cell.ch, action.cell.fg, action.cell.bg, action.cell.bold, action.cell.size);
        } else {
            deleteCell(action.x, action.y);
        }
    }
    state.redoStack.push(redoActions);
}

function doRedo() {
    if (state.redoStack.length === 0) return;
    const actions = state.redoStack.pop();
    const undoActions = [];
    for (const action of actions) {
        const currentCell = state.cells.get(`${action.x},${action.y}`) || null;
        undoActions.push({ x: action.x, y: action.y, cell: currentCell ? { ...currentCell } : null });
        if (action.cell) {
            setCell(action.x, action.y, action.cell.ch, action.cell.fg, action.cell.bg, action.cell.bold, action.cell.size);
        } else {
            deleteCell(action.x, action.y);
        }
    }
    state.undoStack.push(undoActions);
}

// ============================================
// TOOLS
// ============================================
function setTool(tool) {
    state.tool = tool;
    document.querySelectorAll('.tool-group button').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('tool-' + tool);
    if (btn) btn.classList.add('active');
    containerEl.style.cursor = tool === 'pan' ? 'grab' : tool === 'erase' ? 'crosshair' : tool === 'select' ? 'crosshair' : tool === 'fill' ? 'crosshair' : 'text';
}

function toggleBgEnabled() {
    state.bgEnabled = !state.bgEnabled;
    document.getElementById('bg-toggle').textContent = 'BG:' + (state.bgEnabled ? 'On' : 'Off');
    if (state.bgEnabled) {
        document.getElementById('bg-toggle').classList.add('active');
    } else {
        document.getElementById('bg-toggle').classList.remove('active');
    }
}

function setFontSize() {
    state.fontSize = parseInt(document.getElementById('font-size').value);
}

function toggleBold() {
    state.bold = !state.bold;
    const btn = document.getElementById('btn-bold');
    btn.classList.toggle('active', state.bold);
}

function toggleGrid() {
    state.showGrid = !state.showGrid;
    document.getElementById('btn-grid').classList.toggle('active', state.showGrid);
    updateView();
}

function toggleMinimap() {
    state.showMinimap = !state.showMinimap;
    document.getElementById('btn-minimap').classList.toggle('active', state.showMinimap);
    updateMinimap();
}

function goHome() {
    state.viewX = containerEl.getBoundingClientRect().width / 2;
    state.viewY = containerEl.getBoundingClientRect().height / 2;
    state.cursorX = 0;
    state.cursorY = 0;
    updateView();
}

// ============================================
// FLOOD FILL
// ============================================
function floodFill(startX, startY, fillChar) {
    const startKey = `${startX},${startY}`;
    const startCell = state.cells.get(startKey);
    const targetCh = startCell ? startCell.ch : null;

    if (targetCh === fillChar) return;

    const visited = new Set();
    const queue = [[startX, startY]];
    const undoActions = [];
    let count = 0;
    const MAX_FILL = 5000;

    while (queue.length > 0 && count < MAX_FILL) {
        const [x, y] = queue.shift();
        const key = `${x},${y}`;
        if (visited.has(key)) continue;
        visited.add(key);

        const cell = state.cells.get(key);
        const ch = cell ? cell.ch : null;
        if (ch !== targetCh) continue;

        const oldCell = cell ? { ...cell } : null;
        undoActions.push({ x, y, cell: oldCell });

        if (fillChar) {
            setCell(x, y, fillChar, state.fgColor, state.bgEnabled ? state.bgColor : '#0a0a0a', state.bold, state.fontSize, true);
        } else {
            deleteCell(x, y, true);
        }
        count++;

        queue.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
    }

    if (undoActions.length > 0) pushUndo(undoActions);
}

// ============================================
// SELECTION & CLIPBOARD
// ============================================
function getSelectionBounds() {
    if (!state.selection) return null;
    return {
        x1: Math.min(state.selection.x1, state.selection.x2),
        y1: Math.min(state.selection.y1, state.selection.y2),
        x2: Math.max(state.selection.x1, state.selection.x2),
        y2: Math.max(state.selection.y1, state.selection.y2),
    };
}

function copySelection() {
    const bounds = getSelectionBounds();
    if (!bounds) return;
    const clip = [];
    for (let y = bounds.y1; y <= bounds.y2; y++) {
        for (let x = bounds.x1; x <= bounds.x2; x++) {
            const cell = state.cells.get(`${x},${y}`);
            if (cell) {
                clip.push({ dx: x - bounds.x1, dy: y - bounds.y1, cell: { ...cell } });
            }
        }
    }
    state.clipboard = clip;
    showToast('Copied ' + clip.length + ' cells');
}

function cutSelection() {
    const bounds = getSelectionBounds();
    if (!bounds) return;
    copySelection();
    const undoActions = [];
    for (let y = bounds.y1; y <= bounds.y2; y++) {
        for (let x = bounds.x1; x <= bounds.x2; x++) {
            const key = `${x},${y}`;
            const oldCell = state.cells.get(key);
            if (oldCell) {
                undoActions.push({ x, y, cell: { ...oldCell } });
                deleteCell(x, y);
            }
        }
    }
    if (undoActions.length > 0) pushUndo(undoActions);
    state.selection = null;
    updateSelectionRect();
    showToast('Cut!');
}

function pasteClipboard() {
    if (!state.clipboard || state.clipboard.length === 0) return;
    const undoActions = [];
    for (const item of state.clipboard) {
        const x = state.cursorX + item.dx;
        const y = state.cursorY + item.dy;
        const key = `${x},${y}`;
        const oldCell = state.cells.get(key) || null;
        undoActions.push({ x, y, cell: oldCell ? { ...oldCell } : null });
        setCell(x, y, item.cell.ch, item.cell.fg, item.cell.bg, item.cell.bold, item.cell.size);
    }
    pushUndo(undoActions);
    showToast('Pasted ' + state.clipboard.length + ' cells');
}

function deleteSelection() {
    const bounds = getSelectionBounds();
    if (!bounds) return;
    const undoActions = [];
    for (let y = bounds.y1; y <= bounds.y2; y++) {
        for (let x = bounds.x1; x <= bounds.x2; x++) {
            const key = `${x},${y}`;
            const oldCell = state.cells.get(key);
            if (oldCell) {
                undoActions.push({ x, y, cell: { ...oldCell } });
                deleteCell(x, y);
            }
        }
    }
    if (undoActions.length > 0) pushUndo(undoActions);
    state.selection = null;
    updateSelectionRect();
}

// ============================================
// INPUT HANDLING
// ============================================
function screenToCell(screenX, screenY) {
    const rect = containerEl.getBoundingClientRect();
    const worldX = (screenX - rect.left - state.viewX) / state.zoom;
    const worldY = (screenY - rect.top - state.viewY) / state.zoom;
    return {
        x: Math.floor(worldX / CELL_W),
        y: Math.floor(worldY / CELL_H)
    };
}

function ensureCursorVisible() {
    const container = containerEl.getBoundingClientRect();
    const cx = state.cursorX * CELL_W * state.zoom + state.viewX;
    const cy = state.cursorY * CELL_H * state.zoom + state.viewY;
    const margin = 60;

    if (cx < margin) state.viewX += (margin - cx);
    if (cx > container.width - margin) state.viewX -= (cx - container.width + margin);
    if (cy < margin) state.viewY += (margin - cy);
    if (cy > container.height - margin) state.viewY -= (cy - container.height + margin);
}

function handleMouseDown(e) {
    if (e.button === 1 || (e.button === 0 && state.tool === 'pan')) {
        state.panning = true;
        state.panStartX = e.clientX;
        state.panStartY = e.clientY;
        state.panViewStartX = state.viewX;
        state.panViewStartY = state.viewY;
        containerEl.style.cursor = 'grabbing';
        e.preventDefault();
        return;
    }

    const { x, y } = screenToCell(e.clientX, e.clientY);

    if (state.tool === 'type') {
        state.cursorX = x;
        state.cursorY = y;
        state.selection = null;
        updateSelectionRect();
        focusInput();
    } else if (state.tool === 'select') {
        state.selection = { x1: x, y1: y, x2: x, y2: y };
        state.selectDragging = true;
        updateSelectionRect();
    } else if (state.tool === 'erase') {
        const oldCell = state.cells.get(`${x},${y}`);
        if (oldCell) {
            pushUndo([{ x, y, cell: { ...oldCell } }]);
            deleteCell(x, y);
        }
        state._erasing = true;
    } else if (state.tool === 'fill') {
        const ch = prompt('Fill character (empty to clear):', '#');
        if (ch !== null) {
            floodFill(x, y, ch || null);
        }
    }

    updateView();
    broadcastCursor();
}

function handleMouseMove(e) {
    if (state.panning) {
        state.viewX = state.panViewStartX + (e.clientX - state.panStartX);
        state.viewY = state.panViewStartY + (e.clientY - state.panStartY);
        updateView();
        return;
    }

    if (state.selectDragging && state.selection) {
        const { x, y } = screenToCell(e.clientX, e.clientY);
        state.selection.x2 = x;
        state.selection.y2 = y;
        updateSelectionRect();
    }

    if (state._erasing) {
        const { x, y } = screenToCell(e.clientX, e.clientY);
        const key = `${x},${y}`;
        const oldCell = state.cells.get(key);
        if (oldCell) {
            pushUndo([{ x, y, cell: { ...oldCell } }]);
            deleteCell(x, y);
            renderVisibleCells();
        }
    }
}

function handleMouseUp(e) {
    if (state.panning) {
        state.panning = false;
        containerEl.style.cursor = state.tool === 'pan' ? 'grab' : 'text';
    }
    state.selectDragging = false;
    state._erasing = false;
}

function handleWheel(e) {
    e.preventDefault();
    const rect = containerEl.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const oldZoom = state.zoom;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    state.zoom = Math.max(0.1, Math.min(5, state.zoom * delta));

    // Zoom towards mouse
    state.viewX = mouseX - (mouseX - state.viewX) * (state.zoom / oldZoom);
    state.viewY = mouseY - (mouseY - state.viewY) * (state.zoom / oldZoom);

    updateView();
}

function handleKeyDown(e) {
    // Ctrl/Cmd shortcuts
    if (e.ctrlKey || e.metaKey) {
        switch (e.key.toLowerCase()) {
            case 'z':
                e.preventDefault();
                if (e.shiftKey) doRedo(); else doUndo();
                updateView();
                return;
            case 'y':
                e.preventDefault();
                doRedo();
                updateView();
                return;
            case 'c':
                if (state.selection) { e.preventDefault(); copySelection(); }
                return;
            case 'x':
                if (state.selection) { e.preventDefault(); cutSelection(); }
                return;
            case 'v':
                e.preventDefault();
                handlePaste();
                return;
            case 'a':
                e.preventDefault();
                // Select all? Not very meaningful on infinite canvas
                return;
            case 's':
                e.preventDefault();
                saveCurrentWorld();
                return;
        }
    }

    // Arrow keys
    if (e.key === 'ArrowLeft') { e.preventDefault(); state.cursorX--; ensureCursorVisible(); updateView(); broadcastCursor(); return; }
    if (e.key === 'ArrowRight') { e.preventDefault(); state.cursorX++; ensureCursorVisible(); updateView(); broadcastCursor(); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); state.cursorY--; ensureCursorVisible(); updateView(); broadcastCursor(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); state.cursorY++; ensureCursorVisible(); updateView(); broadcastCursor(); return; }

    if (e.key === 'Backspace') {
        e.preventDefault();
        if (state.selection) {
            deleteSelection();
        } else {
            state.cursorX--;
            const key = `${state.cursorX},${state.cursorY}`;
            const oldCell = state.cells.get(key);
            if (oldCell) {
                pushUndo([{ x: state.cursorX, y: state.cursorY, cell: { ...oldCell } }]);
            }
            deleteCell(state.cursorX, state.cursorY);
        }
        ensureCursorVisible();
        updateView();
        broadcastCursor();
        return;
    }

    if (e.key === 'Delete') {
        e.preventDefault();
        if (state.selection) {
            deleteSelection();
        } else {
            const key = `${state.cursorX},${state.cursorY}`;
            const oldCell = state.cells.get(key);
            if (oldCell) {
                pushUndo([{ x: state.cursorX, y: state.cursorY, cell: { ...oldCell } }]);
                deleteCell(state.cursorX, state.cursorY);
            }
        }
        updateView();
        return;
    }

    if (e.key === 'Enter') {
        e.preventDefault();
        state.cursorX = state._lineStartX || 0;
        state.cursorY++;
        ensureCursorVisible();
        updateView();
        broadcastCursor();
        return;
    }

    if (e.key === 'Tab') {
        e.preventDefault();
        state.cursorX += 4;
        ensureCursorVisible();
        updateView();
        broadcastCursor();
        return;
    }

    if (e.key === 'Escape') {
        state.selection = null;
        updateSelectionRect();
        return;
    }

    // Regular character input
    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        if (state._lineStartX === undefined) state._lineStartX = state.cursorX;
        const x = state.cursorX;
        const y = state.cursorY;
        const key = `${x},${y}`;
        const oldCell = state.cells.get(key) || null;
        pushUndo([{ x, y, cell: oldCell ? { ...oldCell } : null }]);
        setCell(x, y, e.key, state.fgColor, state.bgEnabled ? state.bgColor : '#0a0a0a', state.bold, state.fontSize);
        state.cursorX++;
        ensureCursorVisible();
        updateView();
        broadcastCursor();
    }
}

async function handlePaste() {
    // If we have internal clipboard, use it
    if (state.clipboard && state.clipboard.length > 0) {
        pasteClipboard();
        updateView();
        return;
    }

    // Otherwise try to get system clipboard text
    try {
        const text = await navigator.clipboard.readText();
        if (text) {
            pasteText(text);
        }
    } catch (err) {
        // Fallback: use hidden input
        const input = document.getElementById('hidden-input');
        input.value = '';
        input.focus();
        setTimeout(() => {
            if (input.value) pasteText(input.value);
            focusInput();
        }, 100);
    }
}

function pasteText(text) {
    const lines = text.split('\n');
    const undoActions = [];
    let cy = state.cursorY;
    for (const line of lines) {
        let cx = state.cursorX;
        for (const ch of line) {
            if (ch === '\r') continue;
            const key = `${cx},${cy}`;
            const oldCell = state.cells.get(key) || null;
            undoActions.push({ x: cx, y: cy, cell: oldCell ? { ...oldCell } : null });
            setCell(cx, cy, ch, state.fgColor, state.bgEnabled ? state.bgColor : '#0a0a0a', state.bold, state.fontSize);
            cx++;
        }
        cy++;
    }
    if (undoActions.length > 0) pushUndo(undoActions);
    showToast('Pasted text (' + undoActions.length + ' chars)');
    updateView();
}

function focusInput() {
    // Keep focus on the page for key events
    containerEl.focus();
}

// ============================================
// EXPORT / IMPORT
// ============================================
function exportWorld() {
    const data = {
        name: state.worldName,
        exportedAt: Date.now(),
        cells: {}
    };
    for (const [key, cell] of state.cells) {
        data.cells[key] = cell;
    }
    const json = JSON.stringify(data);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (state.worldName || 'world') + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Exported!');
}

function showImportModal() {
    document.getElementById('import-data').value = '';
    document.getElementById('import-modal').classList.add('show');
}

function importJSON() {
    try {
        const raw = document.getElementById('import-data').value;
        const data = JSON.parse(raw);
        if (data.cells) {
            const undoActions = [];
            for (const [key, cell] of Object.entries(data.cells)) {
                const [x, y] = key.split(',').map(Number);
                const oldCell = state.cells.get(key) || null;
                undoActions.push({ x, y, cell: oldCell ? { ...oldCell } : null });
                setCell(x, y, cell.ch, cell.fg, cell.bg, cell.bold, cell.size);
            }
            if (undoActions.length > 0) pushUndo(undoActions);
            if (data.name) {
                state.worldName = data.name;
            }
            closeModal('import-modal');
            showToast('Imported ' + Object.keys(data.cells).length + ' cells');
            updateView();
        }
    } catch (err) {
        alert('Invalid JSON: ' + err.message);
    }
}

function importPlainText() {
    const text = document.getElementById('import-data').value;
    if (!text) return;
    pasteText(text);
    closeModal('import-modal');
}

// ============================================
// WORLDS MODAL
// ============================================
async function showWorldsModal() {
    const worlds = await getAllWorlds();
    const listEl = document.getElementById('worlds-list');
    listEl.innerHTML = '';
    if (worlds.length === 0) {
        listEl.innerHTML = '<p style="color:#888;">No saved worlds yet.</p>';
    }
    worlds.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    for (const w of worlds) {
        const item = document.createElement('div');
        item.className = 'world-list-item';
        const isActive = w.id === state.worldId;
        item.innerHTML = `
            <div class="info">
                <div class="name">${w.name || 'Untitled'} ${isActive ? '⬅ current' : ''}</div>
                <div class="meta">Updated: ${w.updatedAt ? new Date(w.updatedAt).toLocaleString() : 'N/A'}</div>
            </div>
            <div class="actions">
                <button onclick="switchToWorld('${w.id}')">Open</button>
                <button onclick="renameWorld('${w.id}')">✏️</button>
                <button onclick="duplicateWorld('${w.id}')">📋</button>
                <button onclick="confirmDeleteWorld('${w.id}')">🗑</button>
            </div>
        `;
        listEl.appendChild(item);
    }
    document.getElementById('worlds-modal').classList.add('show');
}

async function createNewWorld() {
    const nameInput = document.getElementById('new-world-name');
    const name = nameInput.value.trim() || 'Untitled';
    nameInput.value = '';

    // Save current world first
    if (state.worldId && state.dirty) {
        await saveCurrentWorld();
    }

    // Create new
    const newId = generateId();
    await saveWorldMeta(newId, name);

    // Clear and switch
    clearAllCells();
    state.worldId = newId;
    state.worldName = name;
    state.cursorX = 0;
    state.cursorY = 0;
    state.undoStack = [];
    state.redoStack = [];
    goHome();
    updateView();
    showWorldsModal(); // refresh list
    showToast('Created: ' + name);
}

async function switchToWorld(id) {
    // Save current first
    if (state.worldId && state.dirty) {
        await saveCurrentWorld();
    }

    try {
        const { world, cells } = await loadWorld(id);
        clearAllCells();
        state.worldId = world.id;
        state.worldName = world.name;
        state.cells = cells;
        state.cursorX = 0;
        state.cursorY = 0;
        state.undoStack = [];
        state.redoStack = [];
        state.dirty = false;
        goHome();
        updateView();
        closeModal('worlds-modal');
        showToast('Loaded: ' + world.name);
    } catch (err) {
        alert('Error loading world: ' + err);
    }
}

async function renameWorld(id) {
    const newName = prompt('New name:');
    if (!newName) return;
    await saveWorldMeta(id, newName);
    if (id === state.worldId) state.worldName = newName;
    updateStatus();
    showWorldsModal();
}

async function duplicateWorld(id) {
    const { world, cells } = await loadWorld(id);
    const newId = generateId();
    const newName = world.name + ' (copy)';
    await saveWorldMeta(newId, newName);

    // Save cells under new world
    const tempCells = state.cells;
    state.cells = cells;
    await saveChunks(newId);
    state.cells = tempCells;

    showWorldsModal();
    showToast('Duplicated!');
}

async function confirmDeleteWorld(id) {
    if (!confirm('Delete this world permanently?')) return;
    await deleteWorld(id);
    if (id === state.worldId) {
        state.worldId = null;
        state.worldName = 'Untitled';
        clearAllCells();
        updateView();
    }
    showWorldsModal();
    showToast('Deleted');
}

function clearAllCells() {
    state.cells.clear();
    for (const [, el] of domCells) el.remove();
    domCells.clear();
    state.selection = null;
    updateSelectionRect();
}

function closeModal(id) {
    document.getElementById(id).classList.remove('show');
}

// ============================================
// P2P NETWORKING
// ============================================
function initPeer() {
    return new Promise((resolve) => {
        peer = new Peer();
        peer.on('open', (id) => {
            console.log('My peer ID:', id);
            resolve(id);
        });
        peer.on('connection', (conn) => {
            setupConnection(conn, true);
        });
        peer.on('error', (err) => {
            console.error('Peer error:', err);
            if (err.type === 'peer-unavailable') {
                showToast('Host not found!');
            }
        });
    });
}

function setupConnection(conn, isIncoming) {
    conn.on('open', () => {
        connections.push(conn);
        updateStatus();
        showToast('Peer connected! (' + connections.length + ' total)');

        // If host, send full world state
        if (isHost && isIncoming) {
            const worldData = {};
            for (const [key, cell] of state.cells) {
                worldData[key] = cell;
            }
            conn.send({
                type: 'full-sync',
                worldName: state.worldName,
                cells: worldData
            });
        }
    });

    conn.on('data', (data) => handlePeerData(conn, data));

    conn.on('close', () => {
        connections = connections.filter(c => c !== conn);
        removeRemoteCursor(conn.peer);
        updateStatus();
        showToast('Peer disconnected');
    });

    conn.on('error', (err) => {
        console.error('Connection error:', err);
        connections = connections.filter(c => c !== conn);
        updateStatus();
    });
}

function handlePeerData(conn, data) {
    switch (data.type) {
        case 'full-sync':
            clearAllCells();
            state.worldName = data.worldName || 'Shared World';
            for (const [key, cell] of Object.entries(data.cells)) {
                const [x, y] = key.split(',').map(Number);
                setCell(x, y, cell.ch, cell.fg, cell.bg, cell.bold, cell.size, false);
            }
            updateView();
            showToast('World synced!');
            break;

        case 'cell':
            if (data.cell) {
                setCell(data.x, data.y, data.cell.ch, data.cell.fg, data.cell.bg, data.cell.bold, data.cell.size, false);
            } else {
                deleteCell(data.x, data.y, false);
            }
            renderVisibleCells();
            updateMinimap();
            // Relay to other peers if host
            if (isHost) {
                for (const c of connections) {
                    if (c !== conn && c.open) {
                        c.send(data);
                    }
                }
            }
            break;

        case 'cursor':
            updateRemoteCursor(conn.peer, data.x, data.y, data.name);
            break;
    }
}

function broadcastToAll(data) {
    for (const conn of connections) {
        if (conn.open) {
            try { conn.send(data); } catch (e) {}
        }
    }
}

function broadcastCursor() {
    broadcastToAll({
        type: 'cursor',
        x: state.cursorX,
        y: state.cursorY,
        name: isHost ? 'Host' : 'Guest'
    });
}

let remoteCursors = new Map();

function updateRemoteCursor(peerId, x, y, name) {
    let el = remoteCursors.get(peerId);
    if (!el) {
        el = document.createElement('div');
        el.className = 'remote-cursor';
        const label = document.createElement('div');
        label.className = 'remote-cursor-label';
        el.appendChild(label);
        worldEl.appendChild(el);
        remoteCursors.set(peerId, el);
    }
    el.style.left = (x * CELL_W) + 'px';
    el.style.top = (y * CELL_H) + 'px';
    el.querySelector('.remote-cursor-label').textContent = name || peerId.substr(0, 6);
}

function removeRemoteCursor(peerId) {
    const el = remoteCursors.get(peerId);
    if (el) { el.remove(); remoteCursors.delete(peerId); }
}

// Share modal
function showShareModal() {
    document.getElementById('share-modal').classList.add('show');
    updatePeersList();
}

async function startHosting() {
    if (!peer) await initPeer();
    isHost = true;
    peer.on('open', () => {}); // already handled

    const myId = peer.id;
    const url = window.location.origin + window.location.pathname + '?join=' + myId;
    document.getElementById('share-link').value = url;
    document.getElementById('share-link-area').style.display = 'block';
    showToast('Hosting started!');
}

function copyShareLink() {
    const input = document.getElementById('share-link');
    input.select();
    navigator.clipboard.writeText(input.value);
    showToast('Link copied!');
}

function updatePeersList() {
    const el = document.getElementById('peers-list');
    if (connections.length === 0) {
        el.innerHTML = '<p style="color:#888;font-size:12px;">No peers connected</p>';
    } else {
        el.innerHTML = connections.map(c =>
            `<div style="padding:4px;font-size:12px;">${c.peer} (${c.open ? '🟢 connected' : '🔴 disconnected'})</div>`
        ).join('');
    }
}

async function joinHost(hostId) {
    if (!peer) await initPeer();
    const conn = peer.connect(hostId, { reliable: true });
    setupConnection(conn, false);
    showToast('Connecting to host...');
}

// ============================================
// TOAST
// ============================================
function showToast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
}

// ============================================
// INIT
// ============================================
async function init() {
    worldEl = document.getElementById('world');
    cursorEl = document.getElementById('cursor');
    containerEl = document.getElementById('canvas-container');
    selectionRectEl = document.getElementById('selection-rect');
    gridCanvas = document.getElementById('grid-canvas');
    minimapCanvas = document.getElementById('minimap-canvas');

    // Open database
    await openDB();

    // Color pickers
    document.getElementById('fg-color').addEventListener('input', (e) => { state.fgColor = e.target.value; });
    document.getElementById('bg-color').addEventListener('input', (e) => { state.bgColor = e.target.value; });

    // Mouse events
    containerEl.addEventListener('mousedown', handleMouseDown);
    window.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleMouseUp);
    containerEl.addEventListener('wheel', handleWheel, { passive: false });

    // Keyboard
    window.addEventListener('keydown', handleKeyDown);

    // Prevent context menu on right click in canvas
    containerEl.addEventListener('contextmenu', (e) => e.preventDefault());

    // Make container focusable
    containerEl.setAttribute('tabindex', '0');
    containerEl.style.outline = 'none';

    // Touch support for mobile
    let lastTouchDist = 0;
    containerEl.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            lastTouchDist = Math.sqrt(dx * dx + dy * dy);
            state.panning = true;
            state.panStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            state.panStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            state.panViewStartX = state.viewX;
            state.panViewStartY = state.viewY;
        } else if (e.touches.length === 1) {
            const touch = e.touches[0];
            handleMouseDown({ clientX: touch.clientX, clientY: touch.clientY, button: 0, preventDefault: () => {} });
        }
    }, { passive: false });

    containerEl.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const scale = dist / lastTouchDist;
            state.zoom = Math.max(0.1, Math.min(5, state.zoom * scale));
            lastTouchDist = dist;

            const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            state.viewX = state.panViewStartX + (mx - state.panStartX);
            state.viewY = state.panViewStartY + (my - state.panStartY);
            updateView();
        } else if (e.touches.length === 1) {
            handleMouseMove({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
        }
    }, { passive: false });

    containerEl.addEventListener('touchend', (e) => {
        state.panning = false;
        state.selectDragging = false;
        state._erasing = false;
    });

    // Center view
    goHome();

    // Auto-save
    setInterval(async () => {
        if (state.dirty && state.worldId) {
            await saveCurrentWorld();
        }
    }, AUTOSAVE_INTERVAL);

    // Check URL params for joining
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('join');
    if (joinId) {
        showToast('Joining session...');
        await initPeer();
        joinHost(joinId);
    } else {
        await initPeer();
        // Load last world or create default
        const worlds = await getAllWorlds();
        if (worlds.length > 0) {
            worlds.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
            await switchToWorld(worlds[0].id);
        } else {
            state.worldId = generateId();
            state.worldName = 'My First World';
            await saveWorldMeta(state.worldId, state.worldName);
            showToast('Welcome! Start typing anywhere.');
        }
    }

    containerEl.focus();
    updateView();

    // Handle window resize
    window.addEventListener('resize', () => {
        updateView();
    });

    // Handle system paste events
    window.addEventListener('paste', (e) => {
        const text = e.clipboardData.getData('text/plain');
        if (text) {
            e.preventDefault();
            // Check if it's a world JSON
            try {
                const data = JSON.parse(text);
                if (data.cells) {
                    if (confirm('Detected world data. Import as world?')) {
                        const undoActions = [];
                        for (const [key, cell] of Object.entries(data.cells)) {
                            const [x, y] = key.split(',').map(Number);
                            const oldCell = state.cells.get(key) || null;
                            undoActions.push({ x, y, cell: oldCell ? { ...oldCell } : null });
                            setCell(x, y, cell.ch, cell.fg, cell.bg, cell.bold, cell.size);
                        }
                        if (undoActions.length > 0) pushUndo(undoActions);
                        updateView();
                        return;
                    }
                }
            } catch (err) {}
            pasteText(text);
            updateView();
        }
    });

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.classList.remove('show');
        });
    });
}

init();
</script>
